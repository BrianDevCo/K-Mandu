<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 566" width="1080" height="566">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A0E05"/>
      <stop offset="50%"  stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#0E0500"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#FF8FAB" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF8FAB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#FFCBA4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFCBA4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="566" fill="url(#bg)"/>
  <rect width="1080" height="566" fill="url(#glow-left)"/>
  <rect width="1080" height="566" fill="url(#glow-right)"/>

  <!-- Borde interior decorativo -->
  <rect x="18" y="18" width="1044" height="530" fill="none"
        stroke="#FF8FAB" stroke-width="1" stroke-dasharray="10,7" rx="4" opacity="0.2"/>

  <!-- Textura: puntos decorativos dispersos -->
  <circle cx="60"  cy="60"  r="1.5" fill="#FF8FAB" opacity="0.15"/>
  <circle cx="180" cy="40"  r="1"   fill="#FF8FAB" opacity="0.12"/>
  <circle cx="300" cy="70"  r="1.5" fill="#FF8FAB" opacity="0.1"/>
  <circle cx="80"  cy="180" r="1"   fill="#FF8FAB" opacity="0.1"/>
  <circle cx="1000" cy="80"  r="1.5" fill="#FF8FAB" opacity="0.15"/>
  <circle cx="1040" cy="200" r="1"   fill="#FF8FAB" opacity="0.12"/>
  <circle cx="920"  cy="50"  r="1.5" fill="#FF8FAB" opacity="0.1"/>
  <circle cx="60"  cy="480" r="1.5" fill="#FF8FAB" opacity="0.15"/>
  <circle cx="1020" cy="490" r="1.5" fill="#FF8FAB" opacity="0.12"/>
  <text x="48"  y="56"  font-size="14" fill="#FF8FAB" opacity="0.18">✦</text>
  <text x="1010" y="56"  font-size="14" fill="#FF8FAB" opacity="0.18">✦</text>
  <text x="48"  y="526" font-size="14" fill="#FF8FAB" opacity="0.18">✦</text>
  <text x="1010" y="526" font-size="14" fill="#FF8FAB" opacity="0.18">✦</text>

  <!-- ===== DUMPLING GRANDE (lado derecho) ===== -->
  <g transform="translate(640,80)">
    <!-- Sombra -->
    <ellipse cx="202" cy="266" rx="168" ry="40" fill="#0A0200" opacity="0.35"/>

    <!-- Cuerpo -->
    <path d="M52,215 Q68,130 200,112 Q332,130 348,215 Q340,268 200,284 Q60,268 52,215 Z"
          fill="#F4EFE4"/>

    <!-- Brillo superior -->
    <ellipse cx="168" cy="155" rx="58" ry="32" fill="white" opacity="0.18"/>

    <!-- Pliegues -->
    <path d="M52,215
             Q60,192 72,200 Q80,180 94,192
             Q104,174 118,186 Q128,170 142,182
             Q153,167 166,178 Q177,165 190,176
             Q201,163 214,174 Q225,163 238,174
             Q249,165 262,176 Q272,167 286,178
             Q298,170 312,182 Q320,174 334,186
             Q346,180 348,215"
          stroke="#C2B49A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Ojo izquierdo -->
    <ellipse cx="165" cy="228" rx="18" ry="19" fill="#1A0A00"/>
    <circle  cx="171" cy="220" r="7"  fill="white"/>
    <circle  cx="174" cy="218" r="3"  fill="white"/>

    <!-- Ojo derecho -->
    <ellipse cx="235" cy="228" rx="18" ry="19" fill="#1A0A00"/>
    <circle  cx="241" cy="220" r="7"  fill="white"/>
    <circle  cx="244" cy="218" r="3"  fill="white"/>

    <!-- Blush -->
    <ellipse cx="136" cy="250" rx="26" ry="14" fill="#FF8FAB" opacity="0.38"/>
    <ellipse cx="264" cy="250" rx="26" ry="14" fill="#FF8FAB" opacity="0.38"/>

    <!-- Sonrisa -->
    <path d="M176 264 Q200 282 224 264" stroke="#1A0A00" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Vapor -->
    <path d="M165 108 C160 90 167 78 163 60" stroke="#FF8FAB" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M200 102 C195 84 202 72 198 54" stroke="#FF8FAB" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M235 108 C230 90 237 78 233 60" stroke="#FF8FAB" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- ===== TEXTO IZQUIERDO ===== -->
  <!-- Overline pequeño -->
  <text x="80" y="168"
        font-family="Arial, sans-serif"
        font-size="15" fill="#FF8FAB" letter-spacing="8" opacity="0.75">— CALI, COLOMBIA</text>

  <!-- Nombre principal -->
  <text x="76" y="270"
        font-family="'Arial Rounded MT Bold', 'Trebuchet MS', Georgia, serif"
        font-size="112" font-weight="900"
        fill="#FFF8F5" letter-spacing="4">K-Mandu</text>

  <!-- Línea decorativa -->
  <line x1="80" y1="296" x2="480" y2="296" stroke="#FF8FAB" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="80" y="330"
        font-family="Arial, sans-serif"
        font-size="20" fill="#FF8FAB" letter-spacing="8">KOREAN BITES · CALI</text>

  <!-- Descripción -->
  <text x="80" y="378"
        font-family="Arial, sans-serif"
        font-size="16" fill="#C4956A" letter-spacing="1" opacity="0.85">Mandu · Boba Tea · Mochis</text>

  <!-- Horarios -->
  <text x="80" y="414"
        font-family="Arial, sans-serif"
        font-size="14" fill="#9A7A6A" letter-spacing="2">Lun — Dom · 4:00 pm a 10:00 pm</text>

  <!-- Zona -->
  <text x="80" y="438"
        font-family="Arial, sans-serif"
        font-size="14" fill="#9A7A6A" letter-spacing="2">Domicilios · Poblado Campestre</text>

  <!-- Separador -->
  <line x1="80" y1="462" x2="300" y2="462" stroke="#FF8FAB" stroke-width="0.8" opacity="0.3"/>

  <!-- CTA -->
  <rect x="80" y="476" width="220" height="48" rx="24"
        fill="#FF8FAB" opacity="0.15" stroke="#FF8FAB" stroke-width="1.2"/>
  <text x="190" y="506"
        text-anchor="middle"
        font-family="'Arial Rounded MT Bold', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#FF8FAB" letter-spacing="3">PIDE POR WHATSAPP</text>

</svg>
